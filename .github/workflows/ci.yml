name: CI build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  native-build-and-publish:
    name: Build Native Image and Publish Container
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up GraalVM (Mandrel, JDK 25)
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: mandrel
          java-version: "25"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Gradle (cache dependencies and wrapper)
        uses: gradle/actions/setup-gradle@v5

      - name: Diagnostic versions
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "GRAALVM_HOME=$GRAALVM_HOME"
          java --version
          native-image --version
          ./gradlew --version

      - name: Build native image via Gradle
        run: |
          ./gradlew --no-daemon :clean :build \
            -Dquarkus.native.enabled=true \
            -Dquarkus.package.jar.enabled=false

      - name: Prepare image name
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: image
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata (tags, labels)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Set up Docker Buildx
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container image and push to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/main/docker/Dockerfile.native-micro
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max